<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الروابط - نسخة الصور الخاصة 🖼️</title>
    <script src="https://cdn.socket.io"></script>
    <style>
        body { background: #0a0a0a; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .box { background: #151515; max-width: 700px; margin: auto; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .card { border: 3px solid #333; cursor: pointer; height: 150px; border-radius: 10px; overflow: hidden; transition: 0.2s; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .selected { border-color: #fb923c !important; transform: scale(1.03); }
        .correct { border-color: #10b981 !important; box-shadow: 0 0 15px #10b981; }
        .hidden { display: none; }
        button { background: #2563eb; color: #fff; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; margin: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <div id="setup">
            <h1>لعبة الروابط 🖼️</h1>
            <input type="text" id="nick" placeholder="اسمك المستعار">
            <button onclick="join()">دخول اللعبة</button>
        </div>

        <div id="game" class="hidden">
            <div id="player-list" style="margin-bottom: 10px; color: #aaa;"></div>
            <h3 id="clue-display" style="color: #fb923c;"></h3>
            <div class="grid" id="grid"></div>
            <div id="controls">
                <div id="draw-ctrl" class="hidden">
                    <input type="text" id="clue-in" placeholder="اكتب اللغز هنا...">
                    <button onclick="sendAction('submitClue')">إرسال اللغز</button>
                </div>
                <button id="fake-btn" class="hidden" onclick="sendAction('submitFake')">تأكيد التضليل</button>
                <button id="vote-btn" class="hidden" onclick="sendAction('submitVote')">تأكيد التصويت</button>
            </div>
        </div>
    </div>

<script>
    const socket = io();
    const myId = 'u_' + Math.random().toString(36).substr(2, 9);
    let selectedImg = null;

    function join() {
        const n = document.getElementById('nick').value;
        if(!n) return alert("ادخل اسمك");
        socket.emit('joinGame', { userId: myId, name: n });
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
    }

    function render(imgs, canClick) {
        const g = document.getElementById('grid'); g.innerHTML = "";
        imgs.forEach(url => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<img src="${url}">`;
            if(canClick) d.onclick = () => {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                d.classList.add('selected'); selectedImg = url;
            };
            g.appendChild(d);
        });
    }

    function sendAction(ev) {
        if(!selectedImg) return alert("اختر صورة أولاً!");
        if(ev === 'submitClue') {
            const c = document.getElementById('clue-in').value;
            if(!c) return alert("اكتب لغزاً!");
            socket.emit(ev, {clue: c, image: selectedImg});
        } else {
            socket.emit(ev, selectedImg);
        }
        selectedImg = null;
        document.getElementById('draw-ctrl').classList.add('hidden');
        document.getElementById('fake-btn').classList.add('hidden');
        document.getElementById('vote-btn').classList.add('hidden');
    }

    socket.on('updatePlayerList', d => {
        let list = Object.values(d.playerNames).join(" - ");
        document.getElementById('player-list').innerText = "اللاعبون: " + list;
    });

    socket.on('roundStarted', d => {
        render(d.images, d.drawerId === myId);
        document.getElementById('draw-ctrl').className = d.drawerId === myId ? "" : "hidden";
        document.getElementById('clue-display').innerText = d.drawerId === myId ? "أنت المشفر: اختر صورة وضع لغزاً" : "بانتظار المشفر...";
    });

    socket.on('showClue', d => {
        document.getElementById('clue-display').innerText = "اللغز: " + d.clue;
        document.getElementById('fake-btn').classList.remove('hidden');
        render(d.pImages, true);
    });

    socket.on('startVoting', d => {
        document.getElementById('clue-display').innerText = "أي صورة اختارها المشفر؟";
        if(myId !== d.drawerId) document.getElementById('vote-btn').classList.remove('hidden');
        render(d.options, myId !== d.drawerId);
    });

    socket.on('roundFinished', d => {
        document.querySelectorAll('.card img').forEach(i => {
            // نستخدم endsWith للتأكد من مطابقة المسار المحلي
            if(i.src.endsWith(d.correctImage)) i.parentElement.classList.add('correct');
        });
    });
</script>
</body>
</html>
