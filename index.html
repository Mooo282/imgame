<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الروابط 🖼️</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #080808; color: #fff; text-align: center; padding: 10px; margin: 0; }
        .box { background: #111; max-width: 800px; margin: 20px auto; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        #player-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .p-tag { background: #222; padding: 5px 10px; border-radius: 8px; border: 1px solid #444; }
        .p-score { color: #2563eb; font-weight: bold; margin-right: 5px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .card { border: 3px solid #222; border-radius: 12px; cursor: pointer; overflow: hidden; height: 160px; transition: 0.2s; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card.selected { border-color: #fb923c; transform: scale(1.05); }
        .correct-answer { border-color: #10b981 !important; box-shadow: 0 0 15px #10b981; }
        .hidden { display: none !important; }
        #timer { font-size: 3em; color: #ef4444; font-weight: bold; }
        button { background: #2563eb; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-size: 1.1em; }
        input { padding:10px; background:#1a1a1a; color:#fff; border:1px solid #444; border-radius:8px; }
    </style>
</head>
<body>

<div class="box">
    <div id="player-bar"></div>
    
    <div id="name-screen">
        <h1>لعبة الروابط 🖼️</h1>
        <input type="text" id="nick" placeholder="اسمك المستعار...">
        <button onclick="join()">دخول</button>
    </div>

    <div id="lobby-screen" class="hidden">
        <div id="host-controls" class="hidden">
            <select id="rounds-count"><option value="5">5 جولات</option><option value="10">10 جولات</option></select>
            <button onclick="startGame()">ابدأ اللعبة 🚀</button>
        </div>
        <p>بانتظار المضيف...</p>
    </div>

    <div id="game-screen" class="hidden">
        <div id="timer">60</div>
        <div id="clue-display" style="font-size: 1.5em; color: #fb923c; margin: 10px;"></div>
        <div class="grid" id="grid"></div>
        
        <div id="controls">
            <div id="draw-ctrl" class="hidden">
                <input type="text" id="clue-in" placeholder="اكتب اللغز هنا...">
                <button onclick="sendAction('submitClue')">إرسال التلميح</button>
            </div>
            <div id="fake-ctrl" class="hidden"><button onclick="sendAction('submitFake')">تأكيد التضليل</button></div>
            <div id="vote-ctrl" class="hidden"><button onclick="sendAction('submitVote')">تأكيد التصويت</button></div>
        </div>
        <div id="results-area"></div>
    </div>
</div>

<script>
    const socket = io();
    let myId = 'u_' + Math.random().toString(36).substr(2, 9);
    let selectedImg = null;

    function join() {
        const n = document.getElementById('nick').value;
        if(!n) return alert("ادخل اسمك");
        socket.emit('joinGame', { userId: myId, name: n });
        document.getElementById('name-screen').classList.add('hidden');
        document.getElementById('lobby-screen').classList.remove('hidden');
    }

    function startGame() { socket.emit('requestStart', { rounds: document.getElementById('rounds-count').value }); }

    function render(images, isClickable) {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        images.forEach(url => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${url}" crossorigin="anonymous">`;
            if (isClickable) {
                card.onclick = () => {
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedImg = url;
                };
            }
            grid.appendChild(card);
        });
    }

    function sendAction(type) {
        if (!selectedImg) return alert("اختر صورة أولاً!");
        if (type === 'submitClue') {
            const clue = document.getElementById('clue-in').value;
            if(!clue) return alert("اكتب لغزاً");
            socket.emit('submitClue', { clue, image: selectedImg });
            document.getElementById('draw-ctrl').classList.add('hidden');
        } else {
            socket.emit(type, selectedImg);
            document.getElementById('fake-ctrl').classList.add('hidden');
            document.getElementById('vote-ctrl').classList.add('hidden');
        }
        selectedImg = null;
    }

    socket.on('updatePlayerList', d => {
        const bar = document.getElementById('player-bar');
        bar.innerHTML = "";
        if(myId === d.hostId && d.gameState === "LOBBY") document.getElementById('host-controls').classList.remove('hidden');
        d.players.forEach(id => {
            bar.innerHTML += `<div class="p-tag"><span class="p-score">${d.scores[id]||0}</span>${d.playerNames[id]}</div>`;
        });
    });

    socket.on('roundStarted', d => {
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('results-area').innerHTML = "";
        document.getElementById('clue-display').innerText = (myId === d.drawerId) ? "أنت المشفر: اختر صورة واكتب لغزاً" : "بانتظار المشفر...";
        document.getElementById('draw-ctrl').className = (myId === d.drawerId) ? "" : "hidden";
        render(d.images, (myId === d.drawerId));
    });

    socket.on('showClue', d => {
        document.getElementById('clue-display').innerText = "اللغز: " + d.clue;
        if(myId !== socketToUserId) { // Simplified check
            document.getElementById('fake-ctrl').classList.remove('hidden');
            render(d.pImages, true);
        }
    });

    socket.on('startVoting', d => {
        document.getElementById('fake-ctrl').classList.add('hidden');
        document.getElementById('clue-display').innerText = "أي صورة اختارها المشفر؟";
        if(myId !== d.drawerId) document.getElementById('vote-ctrl').classList.remove('hidden');
        render(d.options, (myId !== d.drawerId));
    });

    socket.on('roundFinished', d => {
        document.querySelectorAll('.card img').forEach(img => {
            if(img.src === d.correctImage) img.parentElement.classList.add('correct-answer');
        });
    });

    socket.on('timerUpdate', t => document.getElementById('timer').innerText = t);
</script>
</body>
</html>
